<div class="admin-page">
  <div class="page-header">
    <h2>Users</h2>
    <div class="controls">
      <mat-form-field appearance="outline" class="search">
        <mat-label>Search by name</mat-label>
        <input
          matInput
          [(ngModel)]="filterValue"
          (keyup)="applyFilter()"
          placeholder="Search users..."
        />
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="load()">Refresh</button>
    </div>
  </div>

  <!-- Loader -->
  <div *ngIf="loading" class="loader">
    <mat-progress-spinner
      mode="indeterminate"
      diameter="48"
    ></mat-progress-spinner>
  </div>

  <!-- Table -->
  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    class="mat-elevation-z1"
    *ngIf="!loading"
  >
    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>

    <!-- Name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
      <td mat-cell *matCellDef="let row">{{ row.email }}</td>
    </ng-container>

    <!-- Phone -->
    <ng-container matColumnDef="phone">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Phone</th>
      <td mat-cell *matCellDef="let row">{{ row.phone || "—" }}</td>
    </ng-container>

    <!-- Role -->
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
      <td mat-cell *matCellDef="let row">{{ row.role || "user" }}</td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button [routerLink]="['/admin/users', row.id]">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteUser(row.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <thead>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    </thead>
    <tbody>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </tbody>
  </table>

  <!-- Paginator -->
  <mat-paginator
    *ngIf="!loading"
    [pageSize]="10"
    showFirstLastButtons
  ></mat-paginator>
</div>
