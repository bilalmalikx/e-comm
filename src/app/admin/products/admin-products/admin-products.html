<div class="admin-page">
  <div class="page-header">
    <h2>Products</h2>
    <div class="controls">
      <mat-form-field appearance="outline" class="search">
        <mat-label>Search Product</mat-label>
        <input
          matInput
          [(ngModel)]="filterValue"
          (keyup)="applyFilter()"
          placeholder="Search by name"
        />
      </mat-form-field>

      <button mat-flat-button color="primary" (click)="addProduct()">
        Add Product
      </button>
      <button mat-stroked-button (click)="load()">Refresh</button>
    </div>
  </div>

  <!-- Loader -->
  <div *ngIf="loading$ | async" class="loader">
    <mat-progress-spinner
      mode="indeterminate"
      diameter="48"
    ></mat-progress-spinner>
  </div>

  <!-- Table -->
  <table
    mat-table
    [dataSource]="dataSource"
    class="mat-elevation-z1"
    *ngIf="!(loading$ | async)"
  >
    <!-- id -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let row">{{ row.id }}</td>
    </ng-container>

    <!-- name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <!-- description -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let row">{{ row.description || "-" }}</td>
    </ng-container>

    <!-- price -->
    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price</th>
      <td mat-cell *matCellDef="let row">
        {{ row.price | currency : row.currency }}
      </td>
    </ng-container>

    <!-- currency -->
    <ng-container matColumnDef="currency">
      <th mat-header-cell *matHeaderCellDef>Currency</th>
      <td mat-cell *matCellDef="let row">{{ row.currency }}</td>
    </ng-container>

    <!-- stock -->
    <ng-container matColumnDef="stock">
      <th mat-header-cell *matHeaderCellDef>Stock</th>
      <td mat-cell *matCellDef="let row">{{ row.stock }}</td>
    </ng-container>

    <!-- image -->
    <ng-container matColumnDef="image_url">
      <th mat-header-cell *matHeaderCellDef>Image</th>
      <td mat-cell *matCellDef="let row">
        <img
          *ngIf="row.image_url"
          [src]="row.image_url"
          alt="product image"
          width="50"
          height="50"
        />
        <span *ngIf="!row.image_url">-</span>
      </td>
    </ng-container>

    <!-- actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button (click)="editProduct(row)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button [routerLink]="['/admin/products', row.id]">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteProduct(row.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <thead>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    </thead>
    <tbody>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </tbody>
  </table>

  <!-- Paginator -->
  <mat-paginator
    *ngIf="!(loading$ | async)"
    [pageSize]="10"
    showFirstLastButtons
  ></mat-paginator>
</div>
