<div class="admin-page">
  <div class="page-header">
    <h2>Orders</h2>
    <div class="controls">
      <mat-form-field appearance="outline" class="search">
        <mat-label>Search by customer</mat-label>
        <input
          matInput
          [(ngModel)]="filterValue"
          (keyup)="applyFilter()"
          placeholder="Search orders..."
        />
      </mat-form-field>

      <button mat-flat-button color="primary" (click)="load()">Refresh</button>
    </div>
  </div>

  <!-- Loader -->
  <div *ngIf="loading" class="loader">
    <mat-progress-spinner
      mode="indeterminate"
      diameter="48"
    ></mat-progress-spinner>
  </div>

  <!-- Table -->
  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    class="mat-elevation-z1"
    *ngIf="!loading"
  >
    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Order</th>
      <td mat-cell *matCellDef="let row">#{{ row.id }}</td>
    </ng-container>

    <!-- Customer -->
    <ng-container matColumnDef="customer">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Customer</th>
      <td mat-cell *matCellDef="let row">
        {{ row.customerName || row.user?.name || "—" }}
      </td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <span class="status" [ngClass]="statusClass(row.status)">
          {{ row.status }}
        </span>
      </td>
    </ng-container>

    <!-- Total -->
    <ng-container matColumnDef="total">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Total</th>
      <td mat-cell *matCellDef="let row">{{ row.total | currency : "PKR" }}</td>
    </ng-container>

    <!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button [routerLink]="['/admin/orders', row.id]">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteOrder(row.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <thead>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    </thead>
    <tbody>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </tbody>
  </table>

  <!-- Paginator -->
  <mat-paginator
    *ngIf="!loading"
    [pageSize]="10"
    showFirstLastButtons
  ></mat-paginator>
</div>
