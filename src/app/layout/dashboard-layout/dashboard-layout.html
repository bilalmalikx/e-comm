<div class="dashboard-container">
  <!-- Top Navbar -->
  <header class="topbar">
    <!-- Logo Left -->
    <div class="logo">
      <img src="logo.png" alt="My Website" />
    </div>

    <!-- Desktop/Mobile Nav -->
    <nav class="nav-links" [ngClass]="{ active: menuOpen }">
      <a
        class="nav-link"
        routerLink="/admin"
        routerLinkActive="active"
        (click)="closeMenu()"
      >Dashboard</a>
      <a
        class="nav-link"
        routerLink="/admin/orders"
        routerLinkActive="active"
        (click)="closeMenu()"
      >Orders</a>
      <a
        class="nav-link"
        routerLink="/admin/products"
        routerLinkActive="active"
        (click)="closeMenu()"
      >Products</a>
      <a
        class="nav-link"
        routerLink="/admin/users"
        routerLinkActive="active"
        (click)="closeMenu()"
      >Users</a>
    </nav>

    <!-- Hamburger icon (mobile only) -->
    <div class="menu-toggle" (click)="toggleMenu()">☰</div>

    <!-- Logout button Right -->
    <button class="logout-btn" (click)="logout()">
      <mat-icon class="logout-icon">logout</mat-icon>
      <span class="logout-text">Logout</span>
    </button>
  </header>

  <!-- Main Content -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
