<div class="container">
  <div class="auth-card">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="logo">A</div>
      <h2>Welcome Here!</h2>
      <p>Sign in to continue your journey 🚀</p>

      <!-- Sign Up Button -->
      <div class="btn-container">
        <button
          mat-raised-button
          color="accent"
          class="signup-btn"
          (click)="openSignup()"
          style="background-color: #1e40af; color: white; border-color: #1e40af"
        >
          <mat-icon class="signup-icon">person_add</mat-icon>
          SIGN UP
        </button>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <h1>Sign In</h1>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <!-- Email -->
        <div class="form-group">
          <label>Email</label>
          <div class="input-group">
            <span class="icon"><mat-icon>email</mat-icon></span>
            <input
              formControlName="email"
              type="email"
              placeholder="Enter email"
            />
          </div>
          <small
            class="error"
            *ngIf="
              loginForm.get('email')?.invalid && loginForm.get('email')?.touched
            "
          >
            Please enter a valid email.
          </small>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-group">
            <span class="icon"><mat-icon>lock</mat-icon></span>

            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter password"
            />

            <!-- Toggle button -->
            <span class="toggle-icon" (click)="togglePasswordVisibility()">
              <mat-icon>
                {{ showPassword ? "visibility_off" : "visibility" }}
              </mat-icon>
            </span>
          </div>

          <small
            class="error"
            *ngIf="
              loginForm.get('password')?.invalid &&
              loginForm.get('password')?.touched
            "
          >
            Minimum 6 characters required.
          </small>
        </div>

        <!-- Forgot Password -->
        <div class="form-footer">
          <a class="forgot" (click)="openForgotPassword()"
            >Forgot your password?</a
          >
        </div>

        <!-- Sign In Button -->
        <div class="btn-container">
          <button
            mat-raised-button
            color="primary"
            class="signin-btn"
            type="submit"
          >
            <mat-icon class="signin-icon">login</mat-icon>
            SIGN IN
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
