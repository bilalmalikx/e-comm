<main class="product-detail" *ngIf="product; else loading">
  <section class="product-wrapper">
    <!-- Image -->
    <article class="image-box">
      <img
        [src]="product.image_url || 'assets/no-image.png'"
        [alt]="product.name"
      />
    </article>

    <!-- Info -->
    <article class="info-box">
      <h1 class="title">{{ product.name }}</h1>

      <!-- Rating -->
      <div class="rating">
        <div class="stars">
          <ng-container *ngFor="let star of [1, 2, 3, 4, 5]">
            <svg
              class="star"
              [ngClass]="{ filled: star <= (product.stock || 0) % 5 }"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 576 512"
            >
              <path
                d="M316.9 18C311.6 7 300.4 0 288.1 0s-23.4 7-28.8 18L195 
                150.3 51.4 171.5c-12 1.8-22 10.2-25.7 
                21.7s-.7 24.2 7.9 32.7L137.8 329 
                113.2 474.7c-2 12 3 24.2 12.9 
                31.3s23 8 33.8 2.3l128.3-68.5 
                128.3 68.5c10.8 5.7 23.9 4.9 
                33.8-2.3s14.9-19.3 12.9-31.3L438.5 
                329 542.7 225.9c8.6-8.5 11.7-21.2 
                7.9-32.7s-13.7-19.9-25.7-21.7L381.2 
                150.3 316.9 18z"
              />
            </svg>
          </ng-container>
        </div>
        <p class="reviews">{{ product.stock || 0 }} reviews</p>
      </div>

      <!-- Price -->
      <div class="price">
        <span class="current">{{
          product.price | currency : product.currency
        }}</span>
        <span class="old" *ngIf="product.description">{{
          1.1 * product.price | currency : product.currency
        }}</span>
      </div>

      <!-- Description -->
      <p class="description" [innerHTML]="product.description"></p>

      <!-- Buttons -->
      <div class="actions">
        <button class="btn add" (click)="addToCart(product)">
          Add To Cart
        </button>
        <button class="btn wishlist" type="button">♥ Wishlist</button>
      </div>
    </article>
  </section>
</main>

<ng-template #loading>
  <div class="loading">Loading product...</div>
</ng-template>
